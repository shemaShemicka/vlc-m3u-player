name: Update IPTV List
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Го решава предупредувањето за Node.js
    steps:
      - uses: actions/checkout@v4 # Ја користиме најновата верзија v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run Script
        run: |
          # Ова ќе ни каже дали фајлот воопшто постои пред да почне
          ls -l
          python automator.py

      - name: Push Result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.m3u
          # Спречуваме грешка ако нема промени во листата
          git commit -m "Update list" || echo "No changes to commit"
          git push || echo "No changes to push"
